<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f5f5f0"/>

  <!-- left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#c0392b"/>

  <!-- SA monogram -->
  <rect x="80" y="215" width="200" height="200" rx="36" fill="#e8ddd5"/>
  <text
    x="180" y="342"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-weight="700"
    font-size="92"
    letter-spacing="-2"
    fill="#1a1a1a"
  >SA</text>

  <!-- name -->
  <text
    x="340" y="272"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="400"
    font-size="64"
    fill="#171717"
    letter-spacing="-1"
  >Sanaz Javadi</text>

  <!-- role -->
  <text
    x="340" y="336"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-weight="500"
    font-size="32"
