  >Frontend Engineer</text>

  <!-- divider -->
  <rect x="340" y="364" width="760" height="1.5" fill="#17171714"/>

  <!-- stack -->
  <text
    x="340" y="406"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-weight="400"
    font-size="26"
